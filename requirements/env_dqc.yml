name: dqc
channels:
  - conda-forge
  - defaults
dependencies:
 - pip
 - pip:
   - numpy>=2.0; python_version >= '3.9'
   - numpy<2; python_version < '3.9'
   - h5py
   - -f https://download.pytorch.org/whl/cpu/torch_stable.html
   - torch==2.3.0+cpu
   - git+https://github.com/diffqc/dqclibs.git
   - git+https://gitlab.com/libxc/libxc.git
   - pytest
   - PyYAML
   - yamlloader
   - tqdm
   - pyscf[all]
