name: deepchem
channels:
  - conda-forge
  - defaults
dependencies:
  - openmm
  - mdtraj
  - pdbfixer
  - pip
  - pip:
    - numpy==1.24.3  # numpy>=2.0 dropped Python 3.8 support; this env stays on numpy<2. Pinned to 1.24.3 (not 1.24.4) to satisfy tensorflow==2.13.1's numpy<=1.24.3 constraint.
    - rdkit==2023.09.5
    - pre-commit
    - biopython
    - dgllife
    - lightgbm
    - matminer
    - mordred
    - networkx
    - pillow
    - pubchempy
    - pyGPGO
    - pymatgen<2024  # newer releases need numpy>=1.26; unpinned it makes pip backtrack into source builds
    - simdna
    - transformers==4.46.3
    - tokenizers
    - xgboost
    - gensim  # used by mol2vec
    - tensorboard
    - pyparsing<=3.1.4
