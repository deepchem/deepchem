name: deepchem
channels:
  - conda-forge
  - defaults
dependencies:
  - openmm
  - mdtraj
  - pdbfixer
  - pip
  - pip:
    - numpy>2.0.0
    - pymc>=5.10
    - rdkit==2023.09.5
    - pre-commit
    - biopython
    - dgllife
    - lightgbm
    - matminer
    - mordred
    - networkx
    - pillow
    - pubchempy
    - pymatgen
    - simdna
    - transformers==4.51.3
    - tokenizers
    - xgboost
    - gensim  # used by mol2vec
    - scipy
    - tensorboard
