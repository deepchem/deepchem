name: deepchem
channels:
  - conda-forge
  - defaults
dependencies:
  - openmm
  - mdtraj
  - pdbfixer
  - pip
  - pip:
    - numpy>=2.0
    - pymc>=5.10
    - rdkit==2024.09.1
    - pre-commit
    - biopython
    - dgllife
    - lightgbm
    - matminer
    - mordred
    - networkx
    - pillow
    - pubchempy
    - pymatgen<2024
    - simdna
    - transformers==4.51.3
    - tokenizers
    - xgboost
    - gensim  # used by mol2vec
    - scipy>=1.13.0
    - tensorboard
